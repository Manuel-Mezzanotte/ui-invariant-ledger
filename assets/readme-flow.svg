<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UI Invariant Ledger workflow</title>
  <desc id="desc">A five step flow from touched UI concerns to reviewer focus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="line" x1="132" y1="200" x2="914" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31B99B"/>
      <stop offset="0.5" stop-color="#4C78FF"/>
      <stop offset="1" stop-color="#C78E24"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="20" fill="url(#bg)"/>
  <path d="M280 152H420M640 152H780M900 250L650 312M530 312L280 250" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(70 70)">
      <rect width="250" height="170" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="14" fill="#DFF8F0"/>
      <text x="29" y="42" fill="#13866F" font-size="18" font-weight="760">1</text>
      <text x="26" y="78" fill="#0F172A" font-size="21" font-weight="760">Read</text>
      <text x="26" y="112" fill="#475569" font-size="15" font-weight="560">Touched UI concerns,</text>
      <text x="26" y="136" fill="#475569" font-size="15" font-weight="560">not just diff size.</text>
    </g>

    <g transform="translate(430 70)">
      <rect width="250" height="170" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="14" fill="#E8EEFF"/>
      <text x="28" y="42" fill="#315DDA" font-size="18" font-weight="760">2</text>
      <text x="26" y="78" fill="#0F172A" font-size="21" font-weight="760">Classify</text>
      <text x="26" y="112" fill="#475569" font-size="15" font-weight="560">MICRO, CHECKPOINT,</text>
      <text x="26" y="136" fill="#475569" font-size="15" font-weight="560">or LEDGER.</text>
    </g>

    <g transform="translate(790 70)">
      <rect width="250" height="170" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="14" fill="#E8EEFF"/>
      <text x="28" y="42" fill="#315DDA" font-size="18" font-weight="760">3</text>
      <text x="26" y="78" fill="#0F172A" font-size="21" font-weight="760">Bound</text>
      <text x="26" y="112" fill="#475569" font-size="15" font-weight="560">Preserve, Permit,</text>
      <text x="26" y="136" fill="#475569" font-size="15" font-weight="560">and Probe.</text>
    </g>

    <g transform="translate(250 290)">
      <rect width="250" height="170" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="14" fill="#E8EEFF"/>
      <text x="28" y="42" fill="#315DDA" font-size="18" font-weight="760">4</text>
      <text x="26" y="78" fill="#0F172A" font-size="21" font-weight="760">Verify</text>
      <text x="26" y="112" fill="#475569" font-size="15" font-weight="560">Label evidence:</text>
      <text x="26" y="136" fill="#475569" font-size="15" font-weight="560">CHECKED or INSPECTED.</text>
    </g>

    <g transform="translate(610 290)">
      <rect width="250" height="170" rx="14" fill="#FFFFFF" stroke="#D7DEE8"/>
      <circle cx="34" cy="36" r="14" fill="#FFF3D7"/>
      <text x="28" y="42" fill="#9A6A08" font-size="18" font-weight="760">5</text>
      <text x="26" y="78" fill="#0F172A" font-size="21" font-weight="760">Report</text>
      <text x="26" y="112" fill="#475569" font-size="15" font-weight="560">Reviewer focus, deltas,</text>
      <text x="26" y="136" fill="#475569" font-size="15" font-weight="560">and not checked.</text>
    </g>
  </g>
</svg>
