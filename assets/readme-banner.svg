<svg width="1200" height="450" viewBox="0 0 1200 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UI Invariant Ledger</title>
  <desc id="desc">Risk-scaled checkpoints for preserving observable frontend behavior during AI edits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#182130"/>
    </linearGradient>
    <linearGradient id="accent" x1="94" y1="76" x2="1060" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31D0AA"/>
      <stop offset="0.5" stop-color="#5B8CFF"/>
      <stop offset="1" stop-color="#D6A94A"/>
    </linearGradient>
    <radialGradient id="softA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 72) rotate(146) scale(420 210)">
      <stop stop-color="#5B8CFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 390) rotate(-18) scale(430 190)">
      <stop stop-color="#31D0AA" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#31D0AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1200" height="450" fill="url(#bg)"/>
  <rect width="1200" height="450" fill="url(#grid)"/>
  <rect width="1200" height="450" fill="url(#softA)"/>
  <rect width="1200" height="450" fill="url(#softB)"/>

  <path d="M78 392C232 318 348 330 494 356C622 380 746 392 892 316C1012 254 1084 250 1136 266" stroke="url(#accent)" stroke-width="1.4" stroke-opacity="0.35"/>
  <path d="M78 356C230 284 342 294 482 320C608 344 732 358 874 282C996 218 1078 210 1136 228" stroke="url(#accent)" stroke-width="2.3" stroke-opacity="0.6"/>

  <g transform="translate(88 76)">
    <rect x="0" y="0" width="74" height="74" rx="18" fill="#0E1726" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <path d="M37 15L56 26.5V48.5L37 60L18 48.5V26.5L37 15Z" stroke="url(#accent)" stroke-width="4.4" stroke-linejoin="round"/>
    <path d="M26 35H48M26 45H42" stroke="#E8EEF9" stroke-width="4.4" stroke-linecap="round"/>
  </g>

  <text x="184" y="126" fill="#F7FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="760" letter-spacing="0">
    UI Invariant Ledger
  </text>
  <text x="90" y="196" fill="#C3CDDC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="560" letter-spacing="0">
    Risk-scaled checkpoints for frontend AI edits.
  </text>
  <text x="90" y="230" fill="#9FAEC4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="520" letter-spacing="0">
    Preserve behavior. Label evidence. Focus review.
  </text>

  <g transform="translate(90 266)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650">
    <rect x="0" y="0" width="118" height="38" rx="8" fill="#10251F" stroke="#31D0AA" stroke-opacity="0.5"/>
    <text x="17" y="25" fill="#9DF2DD">Risk Gate</text>
    <rect x="136" y="0" width="198" height="38" rx="8" fill="#111B31" stroke="#5B8CFF" stroke-opacity="0.5"/>
    <text x="154" y="25" fill="#C6D5FF">Preserve / Permit / Probe</text>
    <rect x="352" y="0" width="154" height="38" rx="8" fill="#2A2113" stroke="#D6A94A" stroke-opacity="0.55"/>
    <text x="370" y="25" fill="#F5D789">Evidence Labels</text>
  </g>

  <g transform="translate(90 336)" filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="0" y="0" width="210" height="78" rx="10" fill="#0D1524" stroke="#31D0AA" stroke-opacity="0.26"/>
    <text x="22" y="30" fill="#9DF2DD" font-size="17" font-weight="740">Preserve</text>
    <text x="22" y="56" fill="#C9D4E6" font-size="14" font-weight="550">behavior contracts</text>

    <rect x="238" y="0" width="210" height="78" rx="10" fill="#0D1524" stroke="#5B8CFF" stroke-opacity="0.28"/>
    <text x="260" y="30" fill="#C6D5FF" font-size="17" font-weight="740">Permit</text>
    <text x="260" y="56" fill="#C9D4E6" font-size="14" font-weight="550">intentional changes</text>

    <rect x="476" y="0" width="210" height="78" rx="10" fill="#0D1524" stroke="#D6A94A" stroke-opacity="0.32"/>
    <text x="498" y="30" fill="#F5D789" font-size="17" font-weight="740">Probe</text>
    <text x="498" y="56" fill="#C9D4E6" font-size="14" font-weight="550">unverified risks</text>
  </g>
</svg>
