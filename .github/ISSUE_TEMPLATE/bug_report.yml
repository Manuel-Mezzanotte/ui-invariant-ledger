name: Bug report
description: Report incorrect mode selection, unclear output, or broken install behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Risk Gate
        - MICRO output
        - CHECKPOINT output
        - LEDGER output
        - Evidence wording
        - Install / packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt or task
      description: Paste the user request or a minimal reproduction.
      render: text
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the skill have done?
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did it do instead?
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include relevant diff snippets, output, or checks. Do not include secrets.
